# gitagent manifest — schema: https://github.com/open-gitagent/gitagent/blob/main/spec/schemas/agent-yaml.schema.json
spec_version: "0.1.0"
name: workspace-lead
version: "0.1.0"
description: Orchestrates markdown file handoffs between research, content, and newsletter sub-agents.
license: MIT
skills:
  - daily-intel-sweep
  - distill-memory
tools: []
agents:
  research:
    description: Verifies signals; sole writer of intel/DAILY-INTEL.md (agents/research/).
  content:
    description: Short-form drafts; sole writer of drafts/TODAY-SHORTFORM.md.
  newsletter:
    description: Newsletter drafts; sole writer of drafts/TODAY-NEWSLETTER.md.
delegation:
  mode: explicit
runtime:
  max_turns: 40
  timeout: 600
tags:
  - multi-agent
  - markdown-handoffs
metadata:
  preset: hybrid-gitagent
  template: agent-workspace-template
