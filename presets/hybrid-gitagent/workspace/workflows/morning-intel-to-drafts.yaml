name: morning-intel-to-drafts
description: Research writes intel; content and newsletter consume it
version: "0.1.0"
steps:
  - id: intel_sweep
    action: Run daily intel sweep; write intel/DAILY-INTEL.md
    skill: daily-intel-sweep
    agent: research
    outputs:
      - intel_snapshot

  - id: shortform_drafts
    action: Draft short-form posts from intel
    agent: content
    depends_on:
      - intel_sweep
    inputs:
      intel_path: intel/DAILY-INTEL.md

  - id: newsletter_draft
    action: Draft newsletter from intel
    agent: newsletter
    depends_on:
      - intel_sweep
    inputs:
      intel_path: intel/DAILY-INTEL.md
