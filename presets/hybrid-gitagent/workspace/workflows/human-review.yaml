name: human-review-before-publish
description: Human reviews drafts before anything ships publicly
version: "0.1.0"
steps:
  - id: prepare_branch
    action: Isolate draft and intel changes on a branch for review

  - id: human_review
    action: Human reads drafts/TODAY-SHORTFORM.md and drafts/TODAY-NEWSLETTER.md
    depends_on:
      - prepare_branch
    compliance:
      requires_approval: true
      audit_level: basic

  - id: merge_or_revise
    action: Human merges after approval or sends revision notes back to agents
    depends_on:
      - human_review
